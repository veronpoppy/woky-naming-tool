<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WOKY 產品命名管理工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
<style>


:root {
  --bg: #F4F1ED;
  --card: #ffffff;
  --ink: #141210;
  --mid: #9a9088;
  --light: #e2ddd8;
  --lighter: #f0ece8;
  --accent: #1a1410;
  --woky: #141210;
  --danger: #b85050;
  --add: #3a6a58;
  --disc-bg: #f8f5f2;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:'Noto Sans TC',sans-serif; min-height:100vh; }

/* TOP BAR */
.topbar {
  position:sticky; top:0; z-index:100;
  background:#fff; color:var(--ink);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 48px; height:64px;
  border-bottom:1px solid var(--light);
}
.topbar-brand {
  font-family:'Noto Sans TC',sans-serif; font-size:15px; font-weight:700;
  letter-spacing:8px; text-transform:uppercase; color:var(--ink);
}
.topbar-subtitle {
  font-family:'Noto Sans TC',sans-serif; font-size:10px; font-weight:400;
  color:var(--mid); letter-spacing:1px; margin-left:16px;
}
.topbar-right { display:flex; gap:8px; align-items:center; }

/* MODE SWITCHER */
.mode-tabs { display:flex; gap:2px; }
.mode-tab {
  font-family:'Noto Sans TC',sans-serif; font-size:10px; font-weight:500; letter-spacing:0.5px;
  padding:6px 14px; cursor:pointer; color:var(--mid);
  border:1px solid transparent; background:transparent;
  border-radius:20px; transition:all 0.15s; white-space:nowrap;
}
.mode-tab.active { background:var(--ink); color:#fff; border-color:var(--ink); }
.mode-tab:hover:not(.active) { color:var(--ink); border-color:var(--light); }

/* ACTION BUTTONS */
.btn {
  font-family:'Noto Sans TC',sans-serif; font-size:10px; font-weight:500;
  padding:7px 16px; border-radius:20px; cursor:pointer; border:1px solid transparent;
  transition:all 0.15s; white-space:nowrap; letter-spacing:0.3px;
}
.btn-ghost { background:transparent; color:var(--mid); border-color:var(--light); }
.btn-ghost:hover { color:var(--ink); border-color:var(--ink); }
.btn-primary { background:var(--ink); color:#fff; border-color:var(--ink); }
.btn-primary:hover { background:#333; }
.btn-danger { background:transparent; color:var(--danger); border:1px solid var(--light); font-size:9px; padding:3px 8px; border-radius:20px; }

.btn-edit { color: #5a8a70; border-color: #b8d4c4; }
.btn-edit:hover { background: #5a8a70; color: #fff; border-color: #5a8a70; }.btn-danger:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
.btn-add { background:transparent; color:var(--add); border:1px dashed var(--light); font-size:9px; padding:3px 10px; border-radius:20px; }
.btn-add:hover { background:var(--add); color:#fff; border-color:var(--add); }
.btn-small { padding:3px 10px; font-size:9px; }

/* MAIN LAYOUT */
.main { padding:56px 48px; max-width:1280px; margin:0 auto; }

/* CATEGORY BLOCK */
.cat-block { margin-bottom:72px; }
.cat-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px; padding-bottom:16px;
  border-bottom:2px solid var(--ink);
}
.cat-label {
  font-family:'Noto Sans TC',sans-serif; font-size:22px; font-weight:700;
  letter-spacing:0px; color:var(--ink);
}

/* SERIES GRID */
.series-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:20px; }

/* SERIES CARD */
.series-card {
  background:var(--card); border:1px solid var(--light);
  border-radius:12px; overflow:hidden; transition:box-shadow 0.2s, transform 0.2s;
}
.series-card.drag-over { border:2px dashed var(--accent); background:#faf8f5; }
.series-card:hover { box-shadow:0 8px 32px rgba(0,0,0,0.08); transform:translateY(-2px); }

.series-head {
  padding:18px 20px 14px;
  border-bottom:1px solid var(--lighter);
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.series-name-wrap { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
.series-name { font-family:'Noto Sans TC',sans-serif; font-size:17px; font-weight:700; color:var(--ink); line-height:1.3; }
.series-en { font-family:'Cormorant Garamond',serif; font-size:13px; color:var(--mid); font-style:italic; }
.series-actions { display:flex; gap:6px; flex-shrink:0; }

/* PRODUCT ROW */
.product-row {
  display:flex; align-items:center; padding:11px 20px; gap:10px;
  border-bottom:1px solid var(--lighter);
  cursor:grab; transition:background 0.1s;
  position:relative;
}
.product-row.all-mode { align-items:flex-start; padding-top:14px; padding-bottom:14px; }
.product-row:last-child { border-bottom:none; }
.product-row:hover { background:#faf8f6; }
.product-row.dragging { opacity:0.4; cursor:grabbing; }
.drag-handle { color:var(--light); font-size:14px; cursor:grab; flex-shrink:0; user-select:none; }
.row-end { display:flex; align-items:center; gap:4px; flex-shrink:0; }

.material-tag {
  font-family:'Noto Sans TC',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.3px;
  padding:3px 9px; border-radius:20px; color:#fff; white-space:nowrap; flex-shrink:0;
  cursor:pointer;
}

/* Color picker popup */
.color-popup {
  position:absolute; top:100%; left:0; margin-top:6px; z-index:50;
  background:#fff; border:1px solid var(--light); border-radius:12px;
  padding:12px; box-shadow:0 8px 32px rgba(0,0,0,0.12);
  display:flex; flex-wrap:wrap; gap:6px; width:172px;
}
.color-swatch {
  width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  transition:transform 0.1s, border-color 0.1s;
}
.color-swatch:hover { transform:scale(1.18); }
.color-swatch.active { border-color:var(--ink); }
.color-picker-input { width:100%; height:28px; border:1px solid var(--light); border-radius:6px; cursor:pointer; margin-top:4px; }

.product-name-cell { flex:1; min-width:0; }
.product-name { font-family:'Noto Serif TC',serif; font-size:14px; color:var(--ink); line-height:1.5; }
.suffix-badge {
  font-family:'Noto Sans TC',sans-serif; font-size:9px; font-weight:700;
  color:#fff; background:var(--ink); margin-left:6px;
  padding:1px 7px; border-radius:20px; letter-spacing:0.3px; vertical-align:middle;
}
.old-name-hint { font-family:'Noto Sans TC',sans-serif; font-size:9px; color:var(--mid); display:block; margin-top:2px; }
.product-spec { font-family:'Noto Sans TC',sans-serif; font-size:10px; font-weight:500; color:var(--mid); white-space:nowrap; }
.row-delete { opacity:0; transition:opacity 0.15s; }
.product-row:hover .row-delete { opacity:1; }

/* INLINE EDIT */
.inline-edit {
  background:transparent; border:none; border-bottom:2px solid var(--ink);
  font-family:inherit; font-size:inherit; font-weight:inherit; color:inherit;
  outline:none; width:100%; padding:1px 0;
}

/* ADD ROW */
.add-row { padding:10px 20px; border-top:1px dashed var(--lighter); }

/* DISC SECTION */
.disc-section { background:var(--disc-bg); border:1px dashed var(--light); border-radius:12px; padding:24px; }
.disc-label { font-family:'Noto Sans TC',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; color:var(--mid); margin-bottom:16px; }
.disc-grid { display:flex; flex-wrap:wrap; gap:10px; }
.disc-item {
  background:#fff; border:1px solid var(--light); border-radius:10px;
  padding:10px 14px; display:flex; align-items:center; gap:10px;
  cursor:grab; transition:box-shadow 0.15s;
}
.disc-item:hover { box-shadow:0 4px 16px rgba(0,0,0,0.07); }
.disc-name { font-family:'Noto Serif TC',serif; font-size:13px; color:var(--mid); }
.disc-old { font-family:'Noto Sans TC',sans-serif; font-size:10px; color:#bbb; margin-left:4px; }

/* ALL MODE */
.all-name-rows { display:flex; flex-direction:column; gap:0; flex:1; min-width:0; }
.all-name-row { display:grid; grid-template-columns:56px 1fr; align-items:baseline; column-gap:16px; padding:6px 0; border-bottom:1px solid var(--lighter); }
.all-name-row:last-child { border-bottom:none; }
.all-name-label { font-family:'Noto Sans TC',sans-serif; font-size:9px; font-weight:700; letter-spacing:0.5px; color:var(--mid); text-align:right; padding-top:2px; }
.all-name-val { font-family:'Noto Serif TC',serif; font-size:15px; color:var(--ink); line-height:1.5; }
.all-name-val.is-old { font-family:'Noto Sans TC',sans-serif; font-size:11px; color:#ccc; }
.all-name-val.is-short { font-family:'Noto Sans TC',sans-serif; font-size:13px; font-weight:700; color:var(--ink); }
.all-name-val.is-full { font-family:'Noto Sans TC',sans-serif; font-size:11px; color:#888; }
.all-divider { display:none; }

/* TOAST */
.toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff;
  font-family:'Noto Sans TC',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.5px;
  padding:12px 24px; border-radius:20px;
  opacity:0; pointer-events:none; transition:opacity 0.25s;
  z-index:999; box-shadow:0 4px 20px rgba(0,0,0,0.2);
}
.toast.show { opacity:1; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.25); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.modal { background:#fff; padding:36px; width:500px; border-radius:20px; box-shadow:0 16px 64px rgba(0,0,0,0.12); }
.modal h3 { font-family:'Noto Sans TC',sans-serif; font-size:20px; font-weight:700; margin-bottom:24px; color:var(--ink); }
.modal-field { margin-bottom:16px; }
.modal-field label { font-family:'Noto Sans TC',sans-serif; font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--mid); display:block; margin-bottom:6px; text-transform:uppercase; }
.modal-field input, .modal-field select {
  width:100%; border:1px solid var(--light); padding:10px 14px;
  font-family:'Noto Serif TC',serif; font-size:14px; color:var(--ink);
  border-radius:8px; outline:none; background:#fff; transition:border-color 0.15s;
}
.modal-field input:focus, .modal-field select:focus { border-color:var(--ink); }
.modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:28px; }
.btn-cancel { background:transparent; color:var(--mid); border:1px solid var(--light); font-size:12px; font-weight:500; padding:10px 20px; border-radius:20px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.15s; }
.btn-cancel:hover { border-color:var(--ink); color:var(--ink); }
.btn-confirm { background:var(--ink); color:#fff; border:none; font-size:12px; font-weight:700; padding:10px 20px; border-radius:20px; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:background 0.15s; }
.btn-confirm:hover { background:#333; }

.mode-indicator { font-family:'Noto Sans TC',sans-serif; font-size:9px; letter-spacing:1px; color:var(--mid); padding:2px 10px; background:var(--lighter); border-radius:20px; margin-left:8px; }


/* ── RWD ────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .topbar {
    padding:0 16px; height:auto; min-height:56px;
    flex-wrap:wrap; gap:8px; padding-top:10px; padding-bottom:10px;
  }
  .topbar-brand { font-size:13px; letter-spacing:4px; }
  .topbar-subtitle { display:none; }
  .topbar-right { width:100%; overflow-x:auto; padding-bottom:2px; flex-wrap:nowrap; gap:6px; }
  .mode-tabs { gap:2px; }
  .mode-tab { font-size:9px; padding:5px 8px; }
  .btn { font-size:9px; padding:5px 10px; }

  .main { padding:24px 16px; }

  .cat-label { font-size:16px; }

  .series-grid { grid-template-columns:1fr; gap:14px; }

  .series-head { padding:12px 14px 10px; }
  .series-name { font-size:15px; }

  .product-row { padding:10px 14px; gap:8px; }
  .product-row.all-mode { padding:12px 14px; }
  .product-name { font-size:13px; }
  .drag-handle { display:none; }

  .all-name-row { grid-template-columns:48px 1fr; column-gap:10px; }
  .all-name-label { font-size:8px; }
  .all-name-val { font-size:13px; }

  .disc-section { padding:16px; }
  .disc-item { flex-wrap:wrap; }
}

@media (max-width: 480px) {
  .topbar-brand { font-size:12px; letter-spacing:3px; }
  .main { padding:16px 12px; }
  .cat-label { font-size:14px; }
  .series-name { font-size:14px; }
  .modal { width:calc(100vw - 32px); padding:24px 20px; border-radius:16px; }
  /* Memo sidebar full width on small screens */
}


/* ── RWD ──────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .topbar {
    padding: 0 12px;
    gap: 6px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .topbar::-webkit-scrollbar { display: none; }
  .topbar-brand { font-size: 11px; white-space: nowrap; flex-shrink: 0; }
  .topbar button { font-size: 9px; padding: 5px 10px; white-space: nowrap; flex-shrink: 0; }

  .main { padding: 20px 14px; }

  .cat-header { flex-wrap: wrap; gap: 6px; }
  .cat-label { font-size: 22px; }

  .series-grid { grid-template-columns: 1fr !important; gap: 14px; }

  .series-card { padding: 14px 12px; }
  .series-name { font-size: 16px; }

  .product-row { gap: 6px; padding: 10px 0; flex-wrap: nowrap; }
  .product-spec { font-size: 10px; min-width: 36px; }

  .product-name { font-size: 15px; }

  .all-name-rows { width: 100%; }
  .all-name-row { grid-template-columns: 48px 1fr; column-gap: 10px; }
  .all-name-label { font-size: 8px; }
  .all-name-val { font-size: 13px; }
  .all-name-val.is-short { font-size: 12px; }
  .all-name-val.is-full { font-size: 10px; }

  .disc-section { padding: 14px 0; }

  /* Memo sidebar full screen on mobile */
  div[style*="width:380"] {
    width: 100% !important;
  }
}

@media (max-width: 480px) {
  .cat-label { font-size: 18px; }
  .series-name { font-size: 14px; }
  .product-name { font-size: 13px; }
  .material-tag, .tag-chip { font-size: 8px; padding: 2px 6px; }
}

</style>

// ── SUFFIX TAG COMPONENT ──────────────────────────────────────────
function SuffixTag({ suffix, color, onColorChange, onSuffixChange }) {
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(suffix);
  const ref = useRef();
  const inputRef = useRef();
  useEffect(() => setEditVal(suffix), [suffix]);
  useEffect(() => {
    const close = (e) => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);
  const commit = () => { setEditing(false); if(editVal !== suffix) onSuffixChange(editVal.trim()); };
  if (!suffix) return null;
  return (
    <span ref={ref} style={{position:'relative',display:'inline-flex',alignItems:'center',flexShrink:0}}>
      {editing ? (
        <input ref={inputRef} value={editVal}
          onChange={e=>setEditVal(e.target.value)}
          onBlur={commit}
          onKeyDown={e=>{if(e.key==='Enter'||e.key==='Escape')commit(); e.stopPropagation();}}
          onClick={e=>e.stopPropagation()}
          style={{background:color,color:'#fff',border:'none',outline:'none',fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,padding:'3px 9px',borderRadius:20,width:72,textAlign:'center'}}
          autoFocus />
      ) : (
        <span
          style={{background:color,color:'#fff',fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,padding:'3px 9px',borderRadius:20,cursor:'pointer',userSelect:'none',letterSpacing:'0.3px'}}
          onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
          onDoubleClick={e=>{e.stopPropagation();setOpen(false);setEditing(true);setTimeout(()=>inputRef.current&&inputRef.current.select(),30);}}
          title="點擊選色 · 雙擊改名稱">{suffix}</span>
      )}
      {open && (
        <div className="color-popup" onClick={e=>e.stopPropagation()} style={{minWidth:190,left:'auto',right:0}}>
          <div style={{width:'100%',marginBottom:6,fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,color:'#aaa',letterSpacing:1}}>快選後綴詞</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:4,width:'100%',marginBottom:8}}>
            {SUFFIX_LIST.map(s=>(
              <span key={s}
                onClick={()=>{onSuffixChange(s);onColorChange(DEFAULT_SUFFIX_COLORS[s]||color);setOpen(false);}}
                style={{cursor:'pointer',background:DEFAULT_SUFFIX_COLORS[s]||'#888',color:'#fff',fontSize:'8px',fontWeight:700,padding:'2px 7px',borderRadius:20,fontFamily:'Noto Sans TC,sans-serif'}}>{s}</span>
            ))}
            <span onClick={()=>{onSuffixChange('');setOpen(false);}}
              style={{cursor:'pointer',background:'#eee',color:'#999',fontSize:'8px',fontWeight:700,padding:'2px 7px',borderRadius:20,fontFamily:'Noto Sans TC,sans-serif'}}>✕ 移除</span>
          </div>
          <div style={{width:'100%',marginBottom:4,fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,color:'#aaa',letterSpacing:1}}>顏色</div>
          {SWATCHES.map(c=>(
            <div key={c} className={'color-swatch'+(c===color?' active':'')} style={{background:c}} onClick={()=>{onColorChange(c);setOpen(false);}} />
          ))}
          <input type="color" className="color-picker-input" value={color} onChange={e=>onColorChange(e.target.value)} />
        </div>
      )}
    </span>
  );
}

// ── COLOR PICKER COMPONENT ────────────────────────────────────────
function TagColorPicker({ material, color, onColorChange, onMaterialChange }) {
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(material);
  const ref = useRef();
  const inputRef = useRef();

  useEffect(() => setEditVal(material), [material]);

  useEffect(() => {
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    return () => document.removeEventListener('mousedown', close);
  }, []);

  const commitEdit = () => {
    setEditing(false);
    if (editVal.trim() && editVal !== material) onMaterialChange(editVal.trim());
  };

  return (
    <span ref={ref} style={{position:'relative',display:'inline-block',flexShrink:0}}>
      {editing ? (
        <input
          ref={inputRef}
          value={editVal}
          onChange={e => setEditVal(e.target.value)}
          onBlur={commitEdit}
          onKeyDown={e => { if(e.key==='Enter'||e.key==='Escape') commitEdit(); e.stopPropagation(); }}
          onClick={e => e.stopPropagation()}
          style={{
            background: color, color:'#fff', border:'none', outline:'none',
            fontFamily:'Noto Sans TC,sans-serif', fontSize:'9px', fontWeight:700,
            padding:'2px 7px', borderRadius:10, width:72, textAlign:'center',
          }}
          autoFocus
        />
      ) : (
        <span
          className="material-tag"
          style={{background: color, cursor:'pointer', userSelect:'none'}}
          onClick={e => { e.stopPropagation(); setOpen(o => !o); }}
          onDoubleClick={e => { e.stopPropagation(); setOpen(false); setEditing(true); setTimeout(()=>inputRef.current?.select(),30); }}
          title="點擊選色 · 雙擊改名稱"
        >{material}</span>
      )}
      {open && (
        <div className="color-popup" onClick={e=>e.stopPropagation()}>
          {SWATCHES.map(c => (
            <div key={c} className={`color-swatch ${c===color?'active':''}`}
              style={{background:c}}
              onClick={() => { onColorChange(c); setOpen(false); }} />
          ))}
          <input type="color" className="color-picker-input" value={color}
            onChange={e => onColorChange(e.target.value)} />
          <button
            style={{width:'100%',marginTop:6,padding:'4px 0',fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:500,background:'#f5f0e8',border:'1px solid #ddd',borderRadius:2,cursor:'pointer',color:'#666'}}
            onClick={() => { onColorChange(DEFAULT_COLORS[material] || '#999'); setOpen(false); }}
          >復原預設色</button>
        </div>
      )}
    </span>
  );
}

// ── INLINE EDIT ───────────────────────────────────────────────────
function InlineEdit({ value, onChange, style={}, className='' }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = useRef();
  useEffect(() => setVal(value), [value]);
  if (!editing) return (
    <span style={style} className={className} onDoubleClick={() => { setEditing(true); setTimeout(() => ref.current?.select(), 50); }}
      title="雙擊編輯">{value || '—'}</span>
  );
  return <input ref={ref} className="inline-edit" style={style} value={val}
    onChange={e => setVal(e.target.value)}
    onBlur={() => { setEditing(false); onChange(val); }}
    onKeyDown={e => { if(e.key==='Enter'||e.key==='Escape') { setEditing(false); onChange(val); }}} />;
}

  };

  const renameCat = (oldKey, newKey) => {
    if (!newKey.trim() || newKey === oldKey) return;
    const entries = Object.entries(suffixMemo);
    const idx = entries.findIndex(([k])=>k===oldKey);
    entries[idx] = [newKey.trim(), entries[idx][1]];
    save(Object.fromEntries(entries));
    setEditingCat(null);
  };

  const deleteCat = (cat) => {
    if (!window.confirm(`刪除「${cat}」整個分類？`)) return;
    const next = {...suffixMemo};
    delete next[cat];
    save(next);
  };

  const addCat = () => {
    if (!newCatInput.trim()) return;
    save({...suffixMemo, [newCatInput.trim()]: {color:'#888', items:[]}});
    setNewCatInput('');
    setAddingCat(false);
  };

  const updateItem = (cat, idx, field, val) => {
    const items = [...suffixMemo[cat].items];
    items[idx] = {...items[idx], [field]: val};
    save({...suffixMemo, [cat]: {...suffixMemo[cat], items}});
  };

  const deleteItem = (cat, idx) => {
    const items = suffixMemo[cat].items.filter((_,i)=>i!==idx);
    save({...suffixMemo, [cat]: {...suffixMemo[cat], items}});
  };

  const reorderItems = (cat, fromIdx, toIdx) => {
    if (fromIdx === toIdx) return;
    const items = [...suffixMemo[cat].items];
    const [moved] = items.splice(fromIdx, 1);
    items.splice(toIdx, 0, moved);
    save({...suffixMemo, [cat]: {...suffixMemo[cat], items}});
  };

  const addItem = (cat) => {
    const items = [...suffixMemo[cat].items, {suffix:'', desc:''}];
    save({...suffixMemo, [cat]: {...suffixMemo[cat], items}});
    setEditingItem({cat, idx: items.length - 1});
  };

  const updateCatColor = (cat, color) => {
    save({...suffixMemo, [cat]: {...suffixMemo[cat], color}});
  };

  return (
    <div style={{position:'fixed',top:0,right:0,bottom:0,width:'min(380px, 100vw)',background:'#fff',borderLeft:'1px solid #e2ddd8',zIndex:150,display:'flex',flexDirection:'column',boxShadow:'-8px 0 40px rgba(0,0,0,0.08)'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'20px 24px 16px',borderBottom:'1px solid #e2ddd8',flexShrink:0}}>
        <div>
          <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'15px',fontWeight:700,color:'#141210'}}>後綴詞分類備忘</div>
          <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'10px',color:'#9a9088',marginTop:2}}>雙擊分類名稱或後綴詞可編輯</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'18px',color:'#9a9088',lineHeight:1}}>✕</button>
      </div>

      {/* Body */}
      <div style={{overflowY:'auto',flex:1,padding:'20px 24px'}}>
        {Object.entries(suffixMemo).map(([cat, val]) => (
          <div key={cat} style={{marginBottom:28}}>
            {/* Category header */}
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
              <div style={{position:'relative',width:14,height:14,borderRadius:4,background:val.color,flexShrink:0,overflow:'hidden',cursor:'pointer'}} title="改分類顏色">
                <input type="color" value={val.color} onChange={e=>updateCatColor(cat,e.target.value)}
                  style={{position:'absolute',inset:0,opacity:0,width:'100%',height:'100%',cursor:'pointer',border:'none',padding:0}} />
              </div>
              {editingCat === cat ? (
                <input autoFocus value={newCatName} onChange={e=>setNewCatName(e.target.value)}
                  onBlur={()=>renameCat(cat,newCatName)}
                  onKeyDown={e=>{if(e.key==='Enter')renameCat(cat,newCatName);if(e.key==='Escape')setEditingCat(null);}}
                  style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'12px',fontWeight:700,color:'#141210',border:'none',borderBottom:'1.5px solid #141210',outline:'none',background:'transparent',flex:1}} />
              ) : (
                <span onDoubleClick={()=>{setEditingCat(cat);setNewCatName(cat);}}
                  style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'12px',fontWeight:700,color:'#141210',cursor:'text',flex:1}}
                  title="雙擊改名">{cat}</span>
              )}
              <button onClick={()=>addItem(cat)}
                style={{background:'none',border:'1px dashed #ccc',borderRadius:20,fontSize:'9px',fontWeight:700,color:'#aaa',padding:'2px 8px',cursor:'pointer',flexShrink:0,fontFamily:'Noto Sans TC,sans-serif'}}>+ 後綴</button>
              <button onClick={()=>deleteCat(cat)}
                style={{background:'none',border:'none',fontSize:'12px',color:'#ddd',cursor:'pointer',flexShrink:0,lineHeight:1}} title="刪除分類">✕</button>
            </div>

            {/* Items */}
            <div style={{display:'flex',flexDirection:'column',gap:2,paddingLeft:8}}>
              {val.items.map((item, idx) => (
                <div key={idx}
                  draggable
                  onDragStart={()=>setDragItem({cat,idx})}
                  onDragOver={e=>{e.preventDefault();setDragOverItem({cat,idx});}}
                  onDragLeave={()=>setDragOverItem(null)}
                  onDrop={()=>{if(dragItem&&dragItem.cat===cat)reorderItems(cat,dragItem.idx,idx);setDragItem(null);setDragOverItem(null);}}
                  onDragEnd={()=>{setDragItem(null);setDragOverItem(null);}}
                  style={{display:'flex',gap:8,alignItems:'flex-start',padding:'6px 6px',borderRadius:8,
                    background:dragOverItem?.cat===cat&&dragOverItem?.idx===idx?'#ede9e4':'transparent',
                    opacity:dragItem?.cat===cat&&dragItem?.idx===idx?0.4:1,cursor:'default'}}>
                  {/* Drag handle */}
                  <span style={{color:'#ccc',fontSize:'11px',cursor:'grab',flexShrink:0,marginTop:5,userSelect:'none',lineHeight:1}}>⠿</span>
                  {/* Suffix color swatch */}
                  <div style={{width:24,height:24,borderRadius:6,background:suffixColors[item.suffix]||val.color,cursor:'pointer',position:'relative',overflow:'hidden',flexShrink:0,marginTop:2}}>
                    <input type="color"
                      value={suffixColors[item.suffix]||val.color}
                      onChange={e=>setSuffixColors(sc=>({...sc,[item.suffix]:e.target.value}))}
                      style={{position:'absolute',inset:0,opacity:0,width:'100%',height:'100%',cursor:'pointer',border:'none',padding:0}} />
                  </div>
                  {/* Suffix text editable */}
                  {editingItem?.cat===cat && editingItem?.idx===idx ? (
                    <input autoFocus value={item.suffix}
                      onChange={e=>updateItem(cat,idx,'suffix',e.target.value)}
                      onBlur={()=>setEditingItem(null)}
                      onKeyDown={e=>{if(e.key==='Enter'||e.key==='Escape')setEditingItem(null);}}
                      placeholder="後綴詞"
                      style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',fontWeight:700,color:'#141210',border:'none',borderBottom:'1.5px solid #141210',outline:'none',background:'transparent',width:60,marginTop:3}} />
                  ) : (
                    <span onDoubleClick={()=>setEditingItem({cat,idx})}
                      style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',fontWeight:700,color:'#141210',cursor:'text',width:60,flexShrink:0,marginTop:3}}
                      title="雙擊改後綴詞">{item.suffix || '—'}</span>
                  )}
                  {/* Desc — textarea auto height */}
                  <textarea value={item.desc}
                    onChange={e=>updateItem(cat,idx,'desc',e.target.value)}
                    placeholder="說明文字"
                    rows={1}
                    ref={el=>{if(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}}}
                    style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',color:'#6a6060',lineHeight:'1.6',border:'none',borderBottom:'1px solid transparent',outline:'none',background:'transparent',flex:1,padding:'2px 0',resize:'none',overflow:'hidden',fieldSizing:'content'}}
                    onFocus={e=>e.target.style.borderBottomColor='#ccc'}
                    onBlur={e=>e.target.style.borderBottomColor='transparent'}
                    onInput={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}} />
                  {/* Delete — always visible */}
                  <button onClick={()=>deleteItem(cat,idx)}
                    style={{background:'none',border:'none',fontSize:'13px',color:'#bbb',cursor:'pointer',flexShrink:0,lineHeight:1,padding:'2px 4px',marginTop:2,borderRadius:4}}
                    onMouseEnter={e=>e.currentTarget.style.color='#e05050'}
                    onMouseLeave={e=>e.currentTarget.style.color='#bbb'}
                    title="刪除">✕</button>
                </div>
              ))}
            </div>
          </div>
        ))}

        {/* Add category */}
        {addingCat ? (
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8}}>
            <input autoFocus value={newCatInput} onChange={e=>setNewCatInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter')addCat();if(e.key==='Escape')setAddingCat(false);}}
              placeholder="新分類名稱"
              style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'12px',border:'none',borderBottom:'1.5px solid #141210',outline:'none',background:'transparent',flex:1}} />
            <button onClick={addCat} style={{background:'#141210',color:'#fff',border:'none',borderRadius:20,padding:'4px 12px',fontSize:'10px',fontWeight:700,cursor:'pointer',fontFamily:'Noto Sans TC,sans-serif'}}>新增</button>
            <button onClick={()=>setAddingCat(false)} style={{background:'none',border:'1px solid #e2ddd8',borderRadius:20,padding:'4px 12px',fontSize:'10px',color:'#aaa',cursor:'pointer',fontFamily:'Noto Sans TC,sans-serif'}}>取消</button>
          </div>
        ) : (
          <button onClick={()=>setAddingCat(true)}
            style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'10px',fontWeight:600,color:'#9a9088',background:'transparent',border:'1px dashed #ccc',borderRadius:20,padding:'6px 16px',cursor:'pointer',width:'100%',marginTop:4}}>
            + 新增分類
          </button>
        )}
      </div>
    </div>
  );
}

          <button className="btn btn-ghost" onClick={copyAll}>複製架構</button>
          <button className="btn btn-ghost" onClick={exportCSV}>匯出 CSV</button>
          <button className="btn btn-primary" onClick={exportHTML}>💾 下載儲存版本</button>
        </div>
      </div>

      {/* MEMO SIDEBAR */}
      {memoOpen && (
        <MemoSidebar
          suffixMemo={suffixMemo}
          setSuffixMemo={setSuffixMemo}
          suffixColors={suffixColors}
          setSuffixColors={setSuffixColors}
          onClose={()=>setMemoOpen(false)}
        />
      )}
      <div className="main">
        {/* hint */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'32px'}}>
          <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',fontWeight:500,color:'var(--mid)',letterSpacing:'0.3px',lineHeight:'1.8'}}>
            雙擊任何文字可直接編輯 · 拖曳產品列可移動系列 · 點擊材質標籤可改色 · 拖至「過期產品」封存 · 瀏覽器自動記憶變更
          </div>
          <button style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'10px',fontWeight:500,color:'#aaa',background:'transparent',border:'1px solid #e0e0e0',padding:'5px 14px',borderRadius:20,cursor:'pointer',whiteSpace:'nowrap',marginLeft:16}}
            onClick={()=>{ if(window.confirm('確定要清除所有變更，回到初始資料嗎？')) { localStorage.removeItem(STORAGE_KEY); setData(INIT_DATA); setTagColors(DEFAULT_COLORS); showToast('已重設為初始資料'); } }}>
            重設資料
          </button>
        </div>

        {/* MATERIAL VIEW */}
        {view === 'material' && (() => {
          const allMats = [...new Set(data.products.map(p=>p.material))].sort();
          return (
            <div>
              {allMats.map(mat => {
                const prods = data.products.filter(p=>p.material===mat);
                const matColor = tagColors[mat] || '#888';
                return (
                  <div key={mat} className="cat-block">
                    <div className="cat-header">
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <span className="cat-label">{mat}</span>
                        <span style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',color:'#9a9088'}}>{prods.length} 個品項</span>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:20}}>
                      {prods.map(p => {
                        const ser = data.series.find(s=>s.id===p.seriesId);
                        return (
                          <div key={p.id} className="series-card">
                            <div className="product-row" style={{cursor:'default'}}>
                              <span className="material-tag" style={{background:matColor,fontSize:'9px',flexShrink:0}}>{mat}</span>
                              <div className="product-name-cell">
                                <div style={{display:'flex',alignItems:'center',gap:6}}>
                                  <span className="product-name">{p.displayName}</span>
                                  {p.suffix && mode!=='old' && mode!=='full' && <SuffixTag suffix={p.suffix} color={suffixColors[p.suffix]||'#888'} onColorChange={c=>setSuffixColors(sc=>({...sc,[p.suffix]:c}))} onSuffixChange={v=>updateProduct(p.id,'suffix',v)} />}
                                </div>
                                {ser && <span className="old-name-hint" style={{color:'#b8b0a8'}}>{ser.name}</span>}
                                {p.oldName && <span className="old-name-hint">舊：{p.oldName}</span>}
                              </div>
                              <span className="product-spec">{p.spec}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* CATEGORIES */}
        {view === 'series' && data.categories.map(cat => {
          const catSeries = data.series.filter(s => s.catId===cat.id);
          return (
            <div key={cat.id} className="cat-block">
              <div className="cat-header">
                <InlineEdit value={cat.label} className="cat-label"
                  onChange={v => setData(d => ({...d, categories: d.categories.map(c => c.id===cat.id?{...c,label:v}:c)}))} />
                <button className="btn btn-add btn-small" onClick={()=>setAddSeriesModal(cat.id)}>+ 系列</button>
              </div>
              <div className="series-grid">
                {catSeries.map(s => {
                  const prods = data.products.filter(p => p.seriesId===s.id);
                  return (
                    <div key={s.id} className={`series-card ${dragOver===s.id?'drag-over':''}`}
                      onDragOver={e=>{e.preventDefault();setDragOver(s.id);}}
                      onDragLeave={()=>setDragOver(null)}
                      onDrop={e=>{setDragOver(null);onDrop(e,s.id);}}>
                      <div className="series-head">
                        <div className="series-name-wrap">
                          <InlineEdit value={s.name} className="series-name" onChange={v=>updateSeries(s.id,'name',v)} />
                          <InlineEdit value={s.en} className="series-en" onChange={v=>updateSeries(s.id,'en',v)} />
                        </div>
                        <div className="series-actions">
                          <button className="btn btn-add btn-small" onClick={()=>{setAddModal({seriesId:s.id});setNewProd({});}}>+ 產品</button>
                          <button className="btn btn-danger btn-small" style={{opacity:0.55}} title="刪除系列（需先移除所有產品）"
                            onClick={()=>{
                              if(prods.length>0){ showToast('請先移除或封存此系列所有產品'); return; }
                              if(window.confirm(`確定刪除「${s.name}」系列嗎？`)){
                                setData(d=>({...d, series:d.series.filter(x=>x.id!==s.id)}));
                                showToast('已刪除系列');
                              }
                            }}>✕ 系列</button>
                        </div>
                      </div>
                      <div className="product-list">
                        {prods.map(p => (
                          <div key={p.id} className={`product-row${mode==='all'?' all-mode':''}`}
                            draggable onDragStart={e=>onDragStart(e,p.id,s.id)}
                            onDragOver={e=>{e.preventDefault();e.stopPropagation();setDragOverProd(p.id);setDragOver(null);}}
                            onDragLeave={e=>{e.stopPropagation();setDragOverProd(null);}}
                            onDrop={e=>onDropOnProd(e,p.id,s.id)}
                            style={dragOverProd===p.id?{outline:'2px dashed #8a7a6a',outlineOffset:'-2px',borderRadius:8,position:'relative'}:{position:'relative'}}>
                            {mode === 'all' ? (
                              <div style={{flex:1,minWidth:0}}>
                                {/* ALL MODE: top bar + name table */}
                                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                                  <span className="drag-handle" style={{flexShrink:0}}>⠿</span>
                                  <TagColorPicker
                                    material={p.material}
                                    color={tagColors[p.material] || '#999'}
                                    onColorChange={c => setTagColors(tc => ({...tc, [p.material]: c}))}
                                    onMaterialChange={v => renameMaterial(p.material, v)}
                                  />
                                  <InlineEdit value={p.spec} className="product-spec" onChange={v=>updateProduct(p.id,'spec',v)} />
                                  <div style={{flex:1}} />
                                  <div className="row-end row-delete">
                                    <button className="btn btn-edit btn-small" title="完整編輯" onClick={()=>setEditModal({...p})}>✎</button>
                                    <button className="btn btn-add btn-small" title="複製此產品" onClick={()=>duplicateProduct(p.id)}>⧉</button>
                                    <button className="btn btn-danger btn-small" title="移至過期" onClick={()=>moveToDisc(p.id)}>封存</button>
                                    <button className="btn btn-danger btn-small" onClick={()=>{ if(window.confirm('確定永久刪除這個產品嗎？此動作無法復原。')) deleteProduct(p.id); }}>✕</button>
                                  </div>
                                </div>
                                <div className="all-name-rows">
                                  <div className="all-name-row">
                                    <span className="all-name-label">展示</span>
                                    <span className="all-name-val"><InlineEdit value={p.displayName} onChange={v=>updateProduct(p.id,'displayName',v)} />{p.suffix && <span style={{marginLeft:6,display:'inline-block'}}><SuffixTag suffix={p.suffix} color={suffixColors[p.suffix]||'#888'} onColorChange={c=>setSuffixColors(sc=>({...sc,[p.suffix]:c}))} onSuffixChange={v=>updateProduct(p.id,'suffix',v)} /></span>}</span>
                                  </div>
                                  <div className="all-name-row">
                                    <span className="all-name-label">簡稱</span>
                                    <span className="all-name-val is-short"><InlineEdit value={p.shortName} onChange={v=>updateProduct(p.id,'shortName',v)} /></span>
                                  </div>
                                  <div className="all-name-row">
                                    <span className="all-name-label">完整品名</span>
                                    <span className="all-name-val is-full"><InlineEdit value={p.fullName} onChange={v=>updateProduct(p.id,'fullName',v)} /></span>
                                  </div>
                                  <div className="all-name-row">
                                    <span className="all-name-label">舊名稱</span>
                                    <span className="all-name-val is-old"><InlineEdit value={p.oldName} onChange={v=>updateProduct(p.id,'oldName',v)} /></span>
                                  </div>
                                </div>
                              </div>
                            ) : (
                              <>
                                <span className="drag-handle">⠿</span>
                                <TagColorPicker
                                  material={p.material}
                                  color={tagColors[p.material] || '#999'}
                                  onColorChange={c => setTagColors(tc => ({...tc, [p.material]: c}))}
                                  onMaterialChange={v => renameMaterial(p.material, v)}
                                />
                                <div className="product-name-cell">
                                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                                    <span className="product-name">
                                      <InlineEdit value={p[modeField]} onChange={v=>updateProduct(p.id,modeField,v)} />
                                    </span>
                                    {p.suffix && mode!=='old' && mode!=='full' && <SuffixTag suffix={p.suffix} color={suffixColors[p.suffix]||'#888'} onColorChange={c=>setSuffixColors(sc=>({...sc,[p.suffix]:c}))} onSuffixChange={v=>updateProduct(p.id,'suffix',v)} />}
                                  </div>
                                  {mode==='display' && p.oldName && (
                                    <span className="old-name-hint">舊：{p.oldName}</span>
                                  )}
                                </div>
                                <InlineEdit value={p.spec} className="product-spec" onChange={v=>updateProduct(p.id,'spec',v)} />
                                <div className="row-end row-delete">
                                  <button className="btn btn-edit btn-small" title="完整編輯" onClick={()=>setEditModal({...p})}>✎</button>
                                  <button className="btn btn-add btn-small" title="複製此產品" onClick={()=>duplicateProduct(p.id)}>⧉</button>
                                  <button className="btn btn-danger btn-small" title="移至過期" onClick={()=>moveToDisc(p.id)}>封存</button>
                                  <button className="btn btn-danger btn-small" onClick={()=>{ if(window.confirm('確定永久刪除這個產品嗎？此動作無法復原。')) deleteProduct(p.id); }}>✕</button>
                                </div>
                              </>
                            )}
                          </div>
                        ))}
                      </div>
                      <div className="add-row">
                        <button className="btn btn-add btn-small" style={{width:'100%'}} onClick={()=>{setAddModal({seriesId:s.id});setNewProd({});}}>
                          + 新增產品
                        </button>
                      </div>
                      {/* Series notes / formula — per mode */}
                      <div style={{borderTop:'1px dashed #e2ddd8',padding:'10px 20px 14px'}}>
                        <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,color:'#b8b0a8',letterSpacing:'0.5px',marginBottom:4}}>
                          命名公式 / 附註
                          <span style={{fontWeight:400,marginLeft:6,color:'#ccc'}}>（{MODES.find(m=>m.key===mode)?.label || mode}）</span>
                        </div>
                        <textarea
                          value={(s.modeNotes&&s.modeNotes[mode])||''}
                          onChange={e=>updateSeries(s.id,'modeNotes',{...(s.modeNotes||{}), [mode]:e.target.value})}
                          placeholder="例：WOKY + 系列 + 材質 + 品類 + 後綴詞"
                          rows={1}
                          ref={el=>{if(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}}}
                          onInput={e=>{e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}}
                          style={{width:'100%',fontFamily:'DM Mono,monospace',fontSize:'11px',color:'#6a6060',lineHeight:'1.7',border:'none',outline:'none',background:'transparent',resize:'none',overflow:'hidden',padding:0,boxSizing:'border-box'}}
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {view === 'series' && (
        <div className="cat-block">
          <div className="cat-header">
            <div className="cat-label" style={{color:'#aaa'}}>過期 / 封存產品 Legacy Products</div>
          </div>
          <div className="disc-section"
            onDragOver={e=>e.preventDefault()}
            onDrop={onDropDisc}>
            <div className="disc-label">拖曳產品到此區域可封存 · 點擊「恢復」可重新分配至系列</div>
            {data.discontinued.length === 0 && (
              <div style={{fontFamily:'DM Mono,monospace',fontSize:'11px',color:'#ccc',padding:'8px 0'}}>目前沒有過期產品</div>
            )}
            <div className="disc-grid">
              {data.discontinued.map(p => (
                <div key={p.id} className="disc-item"
                  onDoubleClick={()=>setEditModal({...p})}
                  style={{cursor:'default'}}
                  title="雙擊編輯">
                  <span className="material-tag" style={{background: tagColors[p.material]||'#999', fontSize:'9px'}}>{p.material}</span>
                  <div style={{flex:1,minWidth:0}}>
                    {/* Old name prominent */}
                    <div style={{fontFamily:'Noto Serif TC,serif',fontSize:'14px',fontWeight:400,color:'#141210',lineHeight:1.4}}>
                      {p.oldName || <span style={{color:'#ccc',fontStyle:'italic'}}>無舊名稱</span>}
                    </div>
                    {/* New display name as subtitle */}
                    <div style={{display:'flex',alignItems:'center',gap:5,marginTop:3,flexWrap:'wrap'}}>
                      <span style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'10px',color:'#aaa'}}>→</span>
                      <span style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'11px',color:'#888'}}>{p.displayName}</span>
                      {p.suffix && <span style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',fontWeight:700,background:suffixColors[p.suffix]||'#888',color:'#fff',padding:'1px 7px',borderRadius:10}}>{p.suffix}</span>}
                    </div>
                    {(sr => sr ? <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',color:'#ccc',marginTop:2}}>原系列：{sr.name}</div> : <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'9px',color:'#e8b4b4',marginTop:2}}>原系列已刪除</div>)(data.series.find(x=>x.id===p.seriesId))}
                  </div>
                  <span className="disc-old">{p.spec}</span>
                  <button className="btn btn-add btn-small" onClick={()=>restoreFromDisc(p.id)}>恢復</button>
                  <button className="btn btn-danger btn-small" onClick={()=>setData(d=>({...d,discontinued:d.discontinued.filter(x=>x.id!==p.id)}))}>✕</button>
                </div>
              ))}
            </div>
          </div>
        </div>
        )}
      </div>

      {/* RESTORE MODAL */}
      {restoreModal && (
        <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')setRestoreModal(null);}}>
          <div className="modal">
            <h3>原系列已刪除，請選擇要恢復到哪個系列</h3>
            <div style={{fontFamily:'Noto Sans TC,sans-serif',fontSize:'12px',color:'#888',marginBottom:12}}>
              產品：{restoreModal.prod.displayName}
            </div>
            <div className="modal-field">
              <label>目標系列</label>
              <select value={restoreModal.targetSeriesId}
                onChange={e=>setRestoreModal(r=>({...r,targetSeriesId:e.target.value}))}
                style={{width:'100%',padding:'6px 8px',borderRadius:4,border:'1px solid #ddd',fontFamily:'Noto Sans TC,sans-serif',fontSize:'12px'}}>
                {data.series.map(s=>(
                  <option key={s.id} value={s.id}>{s.name} {s.en}</option>
                ))}
              </select>
            </div>
            <div className="modal-actions">
              <button className="btn btn-ghost" onClick={()=>setRestoreModal(null)}>取消</button>
              <button className="btn btn-primary" onClick={confirmRestore}>確認恢復</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT PRODUCT MODAL */}
      {editModal && (
        <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')setEditModal(null);}}>
          <div className="modal">
            <h3>編輯產品</h3>
            {[
              {key:'oldName', label:'舊名稱（原始命名）'},
              {key:'displayName', label:'展示名稱 *'},
              {key:'shortName', label:'簡稱'},
              {key:'fullName', label:'完整品名'},
              {key:'suffix', label:'後綴詞（Classic / Pro / Go …）'},
              {key:'spec', label:'規格（容量/尺寸）'},
            ].map(f => (
              <div key={f.key} className="modal-field">
                <label>{f.label}</label>
                <input value={editModal[f.key]||''} onChange={e=>setEditModal(m=>({...m,[f.key]:e.target.value}))} />
              </div>
            ))}
            <div className="modal-field">
              <label>材質標籤（可輸入自訂名稱）</label>
              <input value={editModal.material||''} placeholder="輸入材質，例如：鈦陶瓷"
                onChange={e=>setEditModal(m=>({...m,material:e.target.value}))}
                style={{width:'100%'}} />
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
                {MATERIAL_TAGS.map(t=><span key={t} onClick={()=>setEditModal(m=>({...m,material:t}))} style={{cursor:'pointer',background:tagColors[t]||'#999',color:'#fff',fontSize:'9px',fontWeight:700,padding:'2px 8px',borderRadius:10,fontFamily:'Noto Sans TC,sans-serif'}}>{t}</span>)}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-cancel" onClick={()=>setEditModal(null)}>取消</button>
              <button className="btn-confirm" onClick={saveEdit}>儲存</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD PRODUCT MODAL */}
      {addModal && (
        <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')setAddModal(null);}}>
          <div className="modal">
            <h3>新增產品</h3>
            {[
              {key:'oldName', label:'舊名稱（原始命名）'},
              {key:'displayName', label:'展示名稱 *'},
              {key:'shortName', label:'簡稱'},
              {key:'fullName', label:'完整品名'},
              {key:'suffix', label:'後綴詞（Classic / Pro / Go …）'},
              {key:'spec', label:'規格（容量/尺寸）'},
            ].map(f => (
              <div key={f.key} className="modal-field">
                <label>{f.label}</label>
                <input value={newProd[f.key]||''} onChange={e=>setNewProd(p=>({...p,[f.key]:e.target.value}))} />
              </div>
            ))}
            <div className="modal-field">
              <label>材質標籤（可輸入自訂名稱）</label>
              <input value={newProd.material||''} placeholder="輸入材質，例如：鈦陶瓷"
                onChange={e=>setNewProd(p=>({...p,material:e.target.value}))}
                style={{width:'100%'}} />
              <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:6}}>
                {MATERIAL_TAGS.map(t=><span key={t} onClick={()=>setNewProd(p=>({...p,material:t}))} style={{cursor:'pointer',background:tagColors[t]||'#999',color:'#fff',fontSize:'9px',fontWeight:700,padding:'2px 8px',borderRadius:10,fontFamily:'Noto Sans TC,sans-serif'}}>{t}</span>)}
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn-cancel" onClick={()=>setAddModal(null)}>取消</button>
              <button className="btn-confirm" onClick={addProduct}>新增</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD SERIES MODAL */}
      {addSeriesModal && (
        <div className="modal-bg" onClick={e=>{if(e.target.className==='modal-bg')setAddSeriesModal(null);}}>
          <div className="modal">
            <h3>新增系列</h3>
            <div className="modal-field">
              <label>系列名稱 *</label>
              <input value={newSeries.name||''} onChange={e=>setNewSeries(s=>({...s,name:e.target.value}))} />
            </div>
            <div className="modal-field">
              <label>英文副標</label>
              <input value={newSeries.en||''} onChange={e=>setNewSeries(s=>({...s,en:e.target.value}))} />
            </div>
            <div className="modal-actions">
              <button className="btn-cancel" onClick={()=>setAddSeriesModal(null)}>取消</button>
              <button className="btn-confirm" onClick={addSeries}>新增</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      <div className={`toast ${toast?'show':''}`}>{toast}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);







</script>
</body>
</html>
